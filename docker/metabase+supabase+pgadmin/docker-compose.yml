services:
  analytics:
    healthcheck:
      start_period: 120s
      interval: 10s
      timeout: 5s
      retries: 20

  db:
    volumes:
      - ../volumes/db/init-scripts/10-metabase.sql:/docker-entrypoint-initdb.d/init-scripts/10-metabase.sql:ro

  metabase:
    image: ${METABASE_IMAGE:-metabase/metabase:v0.56.4}
    container_name: ${METABASE_CONTAINER_NAME:-metabase}
    restart: unless-stopped
    depends_on:
      supavisor:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${METABASE_DB_HOST:-supavisor}
      MB_DB_PORT: ${METABASE_DB_PORT:-5432}
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabaseappdb}
      MB_DB_USER: ${METABASE_DB_USER_WITH_TENANT:-postgres.${POOLER_TENANT_ID}}
      MB_DB_PASS: ${METABASE_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      MB_PLUGINS_DIR: /plugins
    volumes:
      - ../metabase/plugins:/plugins
      - ../metabase/data:/metabase-data
      - /dev/urandom:/dev/random:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${METABASE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail http://localhost:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s

  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:9.4}
    container_name: ${PGADMIN_CONTAINER_NAME:-pgadmin}
    restart: unless-stopped
    depends_on:
      supavisor:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_before_prod}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    volumes:
      - ../pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ../pgadmin/pgpassfile:/pgpass:ro
      - ../pgadmin/data:/var/lib/pgadmin
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${PGADMIN_PORT:-5050}:80"

volumes:
  metabase-data:
